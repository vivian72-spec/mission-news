    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .card-enter {
            animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .reveal-anim {
            animation: fadeInDown 0.5s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stamp {
            font-size: 3rem;
            font-weight: 900;
            border: 4px solid;
            display: inline-block;
            padding: 0.25rem 1rem;
            text-transform: uppercase;
            border-radius: 10px;
            font-family: 'Courier New', Courier, monospace;
            transform: rotate(-5deg);
            opacity: 0.8;
        }
        .stamp-true { color: #16a34a; border-color: #16a34a; }
        .stamp-false { color: #dc2626; border-color: #dc2626; }
    </style>

                id: "E7", category: "環境", icon: "fa-leaf", color: "emerald",
                title: "知名戶外品牌首款環境認證產品獲國際肯定",
                content: "某知名戶外運動品牌和一百多位農民合作，成功種植了一批能減少環境負擔的棉花，之後更推出了第一個環境認證的棉花產品，獲得國際社會肯定。",
                reward: "1個「環境」行動指數",
                isTrue: true,
                reference: "Patagonia 等品牌積極推動「再生有機認證 (Regenerative Organic)」，與農民合作種植能恢復土壤健康、增加碳吸收的棉花，是業界的環保先驅。"
            }
        };

        // UI Elements
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const errorMsg = document.getElementById('errorMsg');
        const resultContainer = document.getElementById('resultContainer');

        // Functions
        function handleSearch() {
            const query = searchInput.value.trim().toUpperCase();
            
            if (query === "") return;

            if (cardDatabase[query]) {
                errorMsg.classList.add('hidden');
                renderCard(cardDatabase[query]);
            } else {
                errorMsg.classList.remove('hidden');
                resultContainer.classList.add('hidden');
            }
        }

        function renderCard(data) {
            // Setup colors based on category
            let bgLight, bgDark, textDark, borderDark, refBorder;
            if (data.category === '社會') {
                bgLight = 'bg-[#e73421]/10'; bgDark = 'bg-[#e73421]'; textDark = 'text-[#e73421]'; borderDark = 'border-[#e73421]/30'; refBorder = 'border-[#e73421]';
            } else if (data.category === '經濟') {
                bgLight = 'bg-[#e95098]/10'; bgDark = 'bg-[#e95098]'; textDark = 'text-[#e95098]'; borderDark = 'border-[#e95098]/30'; refBorder = 'border-[#e95098]';
            } else {
                bgLight = 'bg-[#80bf24]/10'; bgDark = 'bg-[#80bf24]'; textDark = 'text-[#80bf24]'; borderDark = 'border-[#80bf24]/30'; refBorder = 'border-[#80bf24]';
            }

            const isTrueText = data.isTrue ? "真實" : "假";
            const stampClass = data.isTrue ? "stamp-true" : "stamp-false";
            const rewardIcon = data.isTrue ? "fa-circle-check text-green-500" : "fa-circle-xmark text-red-500";

            const cardHTML = `
                <div class="bg-white rounded-2xl shadow-2xl overflow-hidden card-enter border-2 ${borderDark}">
                    <!-- Card Header -->
                    <div class="${bgDark} text-white p-4 flex justify-between items-center">
                        <div class="font-bold text-xl flex items-center">
                            <i class="fa-solid ${data.icon} mr-2"></i> [${data.category}] 資訊卡
                        </div>
                        <div class="bg-white text-slate-800 font-black px-4 py-1 rounded-lg text-lg">
                            ${data.id}
                        </div>
                    </div>

                    <!-- News Content -->
                    <div class="p-6 md:p-8">
                        <h2 class="text-2xl md:text-3xl font-black mb-4 ${textDark} leading-tight">${data.title}</h2>
                        <div class="bg-slate-100 p-5 rounded-xl border border-slate-200 mb-6 relative">
                            <div class="absolute top-0 left-4 transform -translate-y-1/2 bg-slate-300 text-slate-700 text-xs font-bold px-2 py-1 rounded">新聞內文</div>
                            <p class="text-slate-700 text-lg md:text-xl leading-relaxed font-medium">
                                ${data.content}
                            </p>
                        </div>
                        
                        <div class="text-center">
                            <button id="revealBtn" class="bg-amber-500 hover:bg-amber-600 text-white text-xl font-bold py-4 px-10 rounded-full shadow-lg transition-transform hover:scale-105 active:scale-95 w-full md:w-auto">
                                <i class="fa-solid fa-gavel mr-2"></i> 判讀新聞真相
                            </button>
                        </div>
                    </div>

                    <!-- Answer Section (Hidden by default) -->
                    <div id="answerSection" class="hidden border-t-4 border-dashed border-slate-200 ${bgLight} p-6 md:p-8 relative">
                        <h3 class="text-center font-bold text-slate-500 mb-4 tracking-widest">====== 判讀結果 ======</h3>
                        
                        <div class="flex flex-col items-center mb-6">
                            <p class="text-xl font-bold mb-2 text-slate-700">這是一則</p>
                            <div class="stamp ${stampClass} mb-4">${isTrueText}新聞</div>
                            
                            <div class="bg-white px-6 py-3 rounded-lg shadow-sm border border-slate-200 flex items-center gap-3 w-full max-w-md mx-auto">
                                <i class="fa-solid ${rewardIcon} text-2xl"></i>
                                <div>
                                    <p class="text-sm text-slate-500 font-bold">判讀正確獎勵</p>
                                    <p class="text-lg font-black text-slate-800">${data.reward}</p>
                                </div>
                            </div>
                        </div>

                        <!-- Real world reference box -->
                        <div class="mt-6 bg-white border-l-4 ${refBorder} p-5 rounded-r-xl shadow-sm">
                            <h4 class="font-bold text-slate-800 mb-2 flex items-center">
                                <i class="fa-solid fa-book-open mr-2 ${textDark}"></i> 現實世界參照
                            </h4>
                            <p class="text-slate-600 leading-relaxed font-medium">
                                ${data.reference}
                            </p>
                        </div>
                    </div>
                </div>
            `;

            resultContainer.innerHTML = cardHTML;
            resultContainer.classList.remove('hidden');

            // Attach event listener to the new button
            document.getElementById('revealBtn').addEventListener('click', function() {
                this.classList.add('hidden'); // Hide button
                const ans = document.getElementById('answerSection');
                ans.classList.remove('hidden');
                ans.classList.add('reveal-anim');
                
                // Scroll slightly to show answer smoothly on mobile
                ans.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            });
        }

        // Event Listeners for Search
        searchBtn.addEventListener('click', handleSearch);
        searchInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                handleSearch();
            }
        });
        
        // Auto focus input on load
        window.onload = () => {
            searchInput.focus();
        };

    </script>
</body>
</html>
